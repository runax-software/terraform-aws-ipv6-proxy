---
- name: Check installed node_exporter version
  ansible.builtin.command: /usr/local/bin/node_exporter --version
  register: node_exporter_installed
  changed_when: false
  failed_when: false

# node_exporter prints --version to stderr, so check both streams.
- name: Record currently installed node_exporter version output
  ansible.builtin.set_fact:
    node_exporter_current: "{{ (node_exporter_installed.stdout | default('')) ~ (node_exporter_installed.stderr | default('')) }}"

- name: Determine package architecture
  ansible.builtin.set_fact:
    node_exporter_arch: "{{ 'arm64' if ansible_architecture in ['aarch64', 'arm64'] else 'amd64' }}"

- name: Download and extract node_exporter
  ansible.builtin.unarchive:
    src: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-{{ node_exporter_arch }}.tar.gz"
    dest: /tmp
    remote_src: true
  when: node_exporter_version not in node_exporter_current

- name: Install node_exporter binary
  ansible.builtin.copy:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-{{ node_exporter_arch }}/node_exporter"
    dest: /usr/local/bin/node_exporter
    mode: "0755"
    remote_src: true
  when: node_exporter_version not in node_exporter_current

- name: Create node_exporter system user
  ansible.builtin.user:
    name: "{{ node_exporter_user }}"
    system: true
    create_home: false
    shell: /usr/sbin/nologin

- name: Own node_exporter binary
  ansible.builtin.file:
    path: /usr/local/bin/node_exporter
    owner: "{{ node_exporter_user }}"
    group: "{{ node_exporter_user }}"

- name: Install node_exporter systemd unit
  ansible.builtin.template:
    src: node_exporter.service.j2
    dest: /etc/systemd/system/node_exporter.service
    mode: "0644"
  notify: Restart node_exporter

- name: Enable and start node_exporter
  ansible.builtin.systemd:
    name: node_exporter
    enabled: true
    state: started
    daemon_reload: true
