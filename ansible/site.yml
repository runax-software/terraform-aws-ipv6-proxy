---
- name: Provision IPv6 proxy node
  hosts: localhost
  connection: local
  become: true
  gather_facts: true

  roles:
    - role: three_proxy

  tasks:
    - name: Install Prometheus node_exporter
      ansible.builtin.import_role:
        name: node_exporter
      when: node_exporter_enabled | default(false) | bool

    - name: Run user-provided extra roles
      ansible.builtin.include_role:
        name: "{{ item }}"
      loop: "{{ extra_roles | default([]) }}"
