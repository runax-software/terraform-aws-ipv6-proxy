name: Security

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  checkov:
    name: Checkov IaC scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          config_file: .checkov.yaml
