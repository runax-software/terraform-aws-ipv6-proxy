name: Security

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  trivy:
    name: Trivy IaC scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy (config scan)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
