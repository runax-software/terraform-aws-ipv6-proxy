name: Ansible Lint

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ansible-lint:
    name: ansible-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install ansible-lint
        run: pip install ansible-lint

      - name: Run ansible-lint
        working-directory: ansible
        run: ansible-lint
