name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: validate (${{ matrix.tool }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - tool: opentofu
            cmd: tofu
          - tool: terraform
            cmd: terraform
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        if: matrix.tool == 'terraform'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest
          terraform_wrapper: false

      - name: Setup OpenTofu
        if: matrix.tool == 'opentofu'
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: latest

      - name: Format check
        run: ${{ matrix.cmd }} fmt -check -recursive

      - name: Init
        run: ${{ matrix.cmd }} init -backend=false

      - name: Validate
        run: ${{ matrix.cmd }} validate

  tflint:
    name: tflint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: latest

      - name: tflint --init
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: tflint --init

      - name: Run tflint
        run: tflint -f compact
